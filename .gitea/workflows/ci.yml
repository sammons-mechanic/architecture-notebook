name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit:
    name: Unit tests + web bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Activate pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm build:web

      - name: Run unit tests
        run: pnpm test

  integration:
    name: Integration tests (Docker container)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Activate pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Verify Docker is reachable
        run: docker version

      - name: Run integration tests (builds image + runs container)
        run: pnpm test:integration
